<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для моей любимой ❤️</title>

<style>
/* экран заставки */

#intro{
position:fixed;
width:100%;
height:100vh;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:10;
}

/* основной сайт скрыт */

#main{
display:none;
}
body{
margin:0;
font-family:Times New Roman;
background-image:url("background.jpg");
background-size:cover;
background-position:center;
color:white;
text-align:center;
overflow-x:hidden;
}

section{
padding:80px 20px;
max-width:700px;
margin:auto;
}

h1{
font-size:48px;
}

#timer{
font-size:24px;
margin-top:20px;
}

#letter{
font-size:22px;
margin-top:40px;
min-height:120px;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
background:white;
color:#ff4b6e;
cursor:pointer;
}

#secret{
display:none;
margin-top:30px;
font-size:30px;
}

/* hearts */

.heart{
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

</style>
</head>

<body>
<!-- ЭКРАН ПРИВЕТСТВИЯ -->

<div id="intro">

<h1>С 8 марта, Сонечка ❤️</h1>

<button onclick="openSite()">Открыть</button>

</div>


<!-- ОСНОВНОЙ САЙТ -->

<div id="main">

<section>

<h1>Моя любовь ❤️</h1>

<div id="timer"></div>

<div id="letter"></div>

<button onclick="startExperience()">Нажми ❤️</button>

<div id="secret">
Я люблю тебя бесконечно ❤️
</div>

</section>

</div>
<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>



<section>

<button onclick="startExperience()">Нажми ❤️</button>


<div id="secret">
Я безумно люблю тебя  
Спасибо, что ты есть в моей жизни, ты мой маяк, а я — твой якорь ❤️
</div>

</section>

  
<script>
function startExperience(){

document.getElementById("secret").style.display="block";

const music = document.getElementById("music");
music.play();
}
/* дата начала отношений */

const startDate = new Date("2026-01-18");

/* таймер */

function updateTimer(){

const now = new Date();
const diff = now - startDate;

const days = Math.floor(diff / (1000*60*60*24));
const hours = Math.floor(diff / (1000*60*60)) % 24;
const minutes = Math.floor(diff / (1000*60)) % 60;
const seconds = Math.floor(diff / 1000) % 60;
  
document.getElementById("timer").innerHTML =
"Мы вместе уже " + days + " дней " + hours + " часов " + minutes + " минут " + + seconds + " секунд ❤️";

}

setInterval(updateTimer,1000);


/* письмо печатается */
text-shadow:0 0 10px rgba(0,0,0,0.7);
const text = `
Я сделал этот сайт специально для тебя, чтобы у тебя всегда была возможность зайти сюда и вспомнить, как я тебя люблю.

Ты сама прекрасно знаешь, что изначально мы ни на что не рассчитывали, но судьба распорядилась иначе, чему я искренне рад.

С твоим появлением моя жизнь обрела новый смысл, Сонечка. Каждый день уже счастливый, ведь у меня есть ты, лучшая девушка в мире.

Спасибо за твою улыбку, терпение,
поддержку, любовь, за то безграничное счастье, которое ты мне даришь ежедневно
и просто спасибо за то, что ты есть.

С 8 марта, моя маленькая принцесса ❤️
`;

let i = 0;

function typeWriter(){

if(i < text.length){
document.getElementById("letter").innerHTML += text.charAt(i);
i++;
setTimeout(typeWriter,100);
}

}

typeWriter();


/* кнопка */




/* сердечки */

function createHeart(){

const heart = document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=3+Math.random()*3+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

setInterval(createHeart,300);

</script>
<script>

function openSite(){

document.getElementById("intro").style.display = "none";
document.getElementById("main").style.display = "block";

}

</script>
</body>
</html>
