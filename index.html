<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Для моей любимой ❤️</title>

<style>

body{
margin:0;
font-family:serif;
color:white;
text-align:center;



text-shadow:0 0 10px rgba(0,0,0,0.8);
}

/* заставка */

#intro{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

background:url("zast.JPG");
background-size:cover;
background-position:center;
  transition:opacity 1s ease;
}
.fade-out{
opacity:0;
}

#intro h1{
font-size:50px;
margin-bottom:30px;
}

/* кнопки */

button{

padding:15px 30px;
font-size:18px;

border:none;
border-radius:30px;

background:#ff4d6d;
color:white;

cursor:pointer;
}

/* основной сайт */

#main{

display:none;
padding:40px;

background:url("background.jpg");
background-size:cover;
background-position:center;
backdrop-filter: blur(6px);
min-height:100vh;

}

#timer{
margin-top:20px;
font-size:22px;
}

#letter{
margin-top:30px;
font-size:20px;
max-width:600px;
margin-left:auto;
margin-right:auto;
line-height:1.7;
white-space:pre-line;
text-align:left;
}

#musicButton{
margin-top:30px;
}
.heart{
position:fixed;
top:-20px;
font-size:22px;
opacity:0.9;
animation:fall linear;
pointer-events:none;
}

@keyframes fall{
0%{
transform:translateY(0);
opacity:1;
}

100%{
transform:translateY(110vh);
opacity:0;
}
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}
</style>
</head>

<body>

<!-- заставка -->

<div id="intro">

<h1>С 8 марта ❤️</h1>

<button onclick="openSite()">Открыть</button>

</div>

<!-- основной сайт -->

<div id="main">

<h1>С 8 марта, Сонечка ❤️</h1>

<div id="timer"></div>


<div id="letter"></div>

</div>

<audio id="music" loop playsinline>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* открытие сайта */

function openSite(){

const intro = document.getElementById("intro");

intro.classList.add("fade-out");

setTimeout(()=>{

intro.style.display="none";
document.getElementById("main").style.display="block";

document.getElementById("music").play();
typeLetter();

},1000);

}

/* музыка + письмо */

function startExperience(){

document.getElementById("music").play();

typeLetter();

}

/* таймер отношений */

const startDate = new Date("2026-01-18");

function updateTimer(){

const now = new Date();

const diff = now - startDate;

const days = Math.floor(diff/(1000*60*60*24));
const hours = Math.floor(diff/(1000*60*60))%24;
const minutes = Math.floor(diff/(1000*60))%60;
const seconds = Math.floor(diff/1000)%60;

document.getElementById("timer").innerHTML =
"Мы вместе уже " +
days+" дней "+
hours+" часов "+
minutes+" минут "+
seconds+" секунд ❤️";

}

setInterval(updateTimer,1000);

/* печать текста */

const text = `

Я сделал этот сайт специально для тебя, чтобы у тебя всегда была возможность зайти сюда и вспомнить, как я тебя люблю.

Ты сама прекрасно знаешь, что изначально мы ни на что не рассчитывали, но судьба распорядилась иначе, чему я искренне рад.

С твоим появлением моя жизнь обрела новый смысл, Сонечка. Каждый день уже счастливый, ведь у меня есть ты, лучшая девушка в мире.

Спасибо за твою улыбку, терпение,
поддержку, любовь, за то безграничное счастье, которое ты мне даришь ежедневно
и просто спасибо за то, что ты есть.

С 8 марта, моя маленькая принцесса ❤️
`;

let i = 0;

function typeLetter(){

if(i < text.length){

document.getElementById("letter").innerHTML += text.charAt(i);

i++;

setTimeout(typeLetter,100);
setInterval(createHeart,1000);
}

}
function createHeart(){

const heart = document.createElement("div");

heart.className = "heart";
heart.innerHTML = "❤️";

heart.style.left = Math.random()*100 + "vw";
heart.style.animationDuration = (3 + Math.random()*3) + "s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}
</script>

</body>
</html>
