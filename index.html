<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Для моей любимой Сонечки</title>

<style>
body{
font-family:Arial;
text-align:center;
background:linear-gradient(120deg,#ff9a9e,#fad0c4);
color:white;
padding:40px;
}

h1{
font-size:45px;
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
}

#love{
display:none;
font-size:28px;
margin-top:20px;
}
</style>

</head>

<body>

<h1>С 8 марта, дорогая ❤️</h1>

<p>
Этот сайт я сделал специально для тебя, чтобы ты могла в любой момент зайти и вспомнить, как я тебя люблю.
</p>

<button onclick="showLove()">Нажми</button>

<div id="love">
Я люблю тебя больше всего на свете, ты моя жизнь 💖
</div>

<script>
function showLove(){
document.getElementById("love").style.display="block";
}
</script>

</body>
</html>
