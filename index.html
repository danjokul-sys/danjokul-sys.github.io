<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Для моей любимой ❤️</title>

<style>

body{
margin:0;
font-family:serif;
color:white;
text-align:center;
text-shadow:0 0 10px rgba(0,0,0,0.8);
overflow-x:hidden;
}

#intro::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
}

#intro *{
position:relative;
z-index:2;
}

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

background-image:url("zast.JPG");
background-size:cover;
background-position:center;

transition:opacity 1s;

z-index:10;
}

@keyframes zoomBg{
from{
background-size:100%;
}
to{
background-size:110%;
}
}

.fade-out{
opacity:0;
}

#intro h1{
font-size:50px;
margin-bottom:30px;
}

/* кнопка */

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
cursor:pointer;
animation:pulse 2s infinite;
}

/* основной сайт */

#main{
display:none;
min-height:100vh;
padding:40px;
background:url("background.jpg");
background-size:cover;
background-position:center;
}

#timer{
margin-top:20px;
font-size:22px;
}

#letter{
margin-top:30px;
font-size:20px;
max-width:650px;
margin-left:auto;
margin-right:auto;
line-height:1.7;
white-space:pre-line;
text-align:left;
background:rgba(0,0,0,0.35);
padding:25px;
border-radius:15px;
}

/* финальная кнопка */

#loveButton{
display:none;
margin-top:40px;
background:#ff2d55;
}

/* финальный текст */

#finalText{
display:none;
font-size:40px;
margin-top:40px;
animation:fadeIn 2s;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

/* сердечки */

.heart{
position:fixed;
top:-20px;
font-size:16px;
opacity:0.7;
animation:fall linear;
pointer-events:none;
}

@keyframes fall{
0%{transform:translateY(0);}
100%{transform:translateY(110vh);}
}

@keyframes pulse{
0%{
transform:scale(1);
box-shadow:0 0 0 0 rgba(255,77,109,0.7);
}

70%{
transform:scale(1.08);
box-shadow:0 0 0 15px rgba(255,77,109,0);
}

100%{
transform:scale(1);
box-shadow:0 0 0 0 rgba(255,77,109,0);
}
}

#openButton{
opacity:0;
margin-top:30px;
animation:showButton 2s forwards;
animation-delay:2s;
}

@keyframes showButton{
to{
opacity:1;
}
}

#loveButton{
display:none;
margin-top:40px;
}

#bigLove{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
flex-direction:column;
font-size:80px;
animation:fadeIn 2s;
}

#bigLove p{
font-size:30px;
margin-top:20px;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

</style>
</head>

<body>

<!-- заставка -->

<div id="intro">

<h1 id="introText"></h1>

<button id="openButton" onclick="openSite()">Открыть</button>

</div>

<!-- основной сайт -->

<div id="main">

<h1>С 8 марта, Сонечка ❤️</h1>

<div id="timer"></div>

<div id="letter"></div>
  <button id="loveButton" onclick="showLove()">
Я тоже тебя люблю ❤️
</button>

<div id="bigLove">
❤️
<p>Ты — лучшее, что случилось со мной</p>
</div>

<button id="loveButton" onclick="loveExplosion()">
Я тоже тебя люблю ❤️
</button>

<div id="finalText">
Ты — лучшее, что со мной случилось ❤️
</div>

</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const introMessage = "С 8 марта ❤️";
let introIndex = 0;

function typeIntro(){

if(introIndex < introMessage.length){

document.getElementById("introText").innerHTML += introMessage.charAt(introIndex);

introIndex++;

setTimeout(typeIntro,120);

}

}

/* открыть сайт */

function openSite(){

const intro = document.getElementById("intro");

intro.classList.add("fade-out");

setTimeout(()=>{

intro.style.display="none";
document.getElementById("main").style.display="block";

document.getElementById("music").play();

typeLetter();

setInterval(createHeart,3000);

},1000);

}

/* таймер отношений */

const startDate = new Date("2026-01-18");

function updateTimer(){

const now = new Date();
const diff = now - startDate;

const days = Math.floor(diff/(1000*60*60*24));
const hours = Math.floor(diff/(1000*60*60))%24;
const minutes = Math.floor(diff/(1000*60))%60;
const seconds = Math.floor(diff/1000)%60;

document.getElementById("timer").innerHTML =
"Мы вместе уже "+
days+" дней "+
hours+" часов "+
minutes+" минут "+
seconds+" секунд ❤️";

}

setInterval(updateTimer,1000);

/* письмо */

const text = `

Я сделал этот сайт специально для тебя, чтобы у тебя всегда была возможность зайти сюда и вспомнить, как я тебя люблю.

Ты сама прекрасно знаешь, что изначально мы ни на что не рассчитывали, но судьба распорядилась иначе, чему я искренне рад.

С твоим появлением моя жизнь обрела новый смысл, Сонечка. Каждый день уже счастливый, ведь у меня есть ты, лучшая девушка в мире.

Спасибо за твою улыбку, терпение,
поддержку, любовь, за то безграничное счастье, которое ты мне даришь ежедневно
и просто спасибо за то, что ты есть.

С 8 марта, моя маленькая принцесса ❤️
`;

let i = 0;

function typeLetter(){

if(i < text.length){

document.getElementById("letter").innerHTML += text.charAt(i);

i++;

setTimeout(typeLetter,90);

}else{

document.getElementById("loveButton").style.display="inline-block";

}

}

/* сердечки */

function createHeart(){

const heart = document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(4+Math.random()*3)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},7000);

}

/* финальный эффект */

function loveExplosion(){

document.getElementById("finalText").style.display="block";

for(let i=0;i<40;i++){
createHeart();
}

}
typeIntro();
  function showLove(){

const block = document.getElementById("bigLove");

block.style.display="flex";

}
</script>

</body>
</html>
