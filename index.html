<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для моей любимой ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#141e30,#243b55);
color:white;
text-align:center;
overflow-x:hidden;
}

section{
padding:80px 20px;
max-width:700px;
margin:auto;
}

h1{
font-size:48px;
}

#timer{
font-size:24px;
margin-top:20px;
}

#letter{
font-size:22px;
margin-top:40px;
min-height:120px;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
background:white;
color:#ff4b6e;
cursor:pointer;
}

#secret{
display:none;
margin-top:30px;
font-size:30px;
}

/* hearts */

.heart{
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

</style>
</head>

<body>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<section>

<h1>С 8 марта, моя дорогая Сонечка ❤️</h1>

<div id="timer"></div>

<div id="letter"></div>

</section>

<section>

<button onclick="startExperience()">Нажми ❤️</button>


<div id="secret">
Я безумно люблю тебя  
Спасибо, что ты есть в моей жизни, ты мой маяк, а я — твой якорь ❤️
</div>

</section>

<script>
function startExperience(){

document.getElementById("secret").style.display="block";

const music = document.getElementById("music");
music.play();
}
/* дата начала отношений */

const startDate = new Date("2026-01-18");

/* таймер */

function updateTimer(){

const now = new Date();
const diff = now - startDate;

const days = Math.floor(diff / (1000*60*60*24));
const hours = Math.floor(diff / (1000*60*60)) % 24;
const minutes = Math.floor(diff / (1000*60)) % 60;

document.getElementById("timer").innerHTML =
"Мы вместе уже " + days + " дней " + hours + " часов " + minutes + " минут ❤️";

}

setInterval(updateTimer,1000);


/* письмо печатается */

const text = `
Я сделал этот сайт специально для тебя, чтобы у тебя всегда была возможность зайти сюда и вспомнить, как я тебя люблю.

Ты сама прекрасно знаешь, что изначально мы ни на что не рассчитывали, но судьба распорядилась иначе, чему я искренне рад.

С твоим появлением моя жизнь обрела новый смысл, Сонечка. Каждый день уже счастливый, ведь у меня есть ты, лучшая девушка в мире.

Спасибо за твою улыбку, терпение,
поддержку, любовь, за то безграничное счастье, которое ты мне даришь ежедневно
и просто спасибо за то, что ты есть.

С 8 марта, моя маленькая принцесса ❤️
`;

let i = 0;

function typeWriter(){

if(i < text.length){
document.getElementById("letter").innerHTML += text.charAt(i);
i++;
setTimeout(typeWriter,100);
}

}

typeWriter();


/* кнопка */

function startExperience(){

document.getElementById("secret").style.display="block";

const music = document.getElementById("music");

music.play();

}


/* сердечки */

function createHeart(){

const heart = document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=3+Math.random()*3+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

setInterval(createHeart,300);

</script>

</body>
</html>
